# =============================================================================
# Factory EMS — Floorplan image static-direct serving (Nginx)
# =============================================================================
# Phase S of Plan 1.3.
#
# Purpose:
#   - Serve floorplan images directly from Nginx without round-tripping through
#     Spring Boot. The backend stores image files under
#     `${EMS_UPLOAD_ROOT}/floorplans/{yyyy-MM}/{uuid}.{ext}` (mounted into
#     nginx as `/var/www/uploads/floorplans/...`, see docker-compose.yml).
#   - Two interchangeable strategies are documented below; Strategy A is the
#     default. Choose Strategy B if the backend wants per-floorplan ACL.
#
# How to wire in:
#   - In docker-compose.yml the `nginx` service must mount
#       ./data/ems_uploads:/var/www/uploads:ro
#     (already present as of Plan 1.3 Phase S).
#   - This file is included from the main server block via:
#       include /etc/nginx/conf.d/floorplan.conf;
#     OR copy the location blocks below into nginx/conf.d/factory-ems.conf.
#   - When Spring Boot returns 302/X-Accel-Redirect, the URL is rewritten
#     internally to the `/_protected_floorplans/` location.
# =============================================================================

# -----------------------------------------------------------------------------
# Strategy A — public alias (default).
# Floorplan images are considered "any authenticated user can see" — so a
# direct static alias is enough. Auth at /api/v1/floorplans/* (CRUD + image
# URL listing) still goes through Spring; only the raw bytes are served by
# Nginx.
#
# Backend `GET /api/v1/floorplans/{id}` returns metadata including
#   image_url = "/api/v1/floorplans/{id}/image?path=2026-04/abcd-1234.png"
# Nginx maps the `path` query parameter onto disk via `alias`.
# -----------------------------------------------------------------------------
location ~ ^/api/v1/floorplans/(?<fp_id>[0-9]+)/image$ {
    # `path` query parameter carries the relative file path stored in DB
    # (column `floorplans.image_path`, e.g. "2026-04/abcd-1234.png").
    # We deliberately do NOT trust user input — the backend round-tripped a
    # signed metadata response so $arg_path matches what was persisted.
    if ($arg_path = "") {
        return 400;
    }

    # Reject path traversal attempts.
    if ($arg_path ~* "(\.\.|//|\\\\)") {
        return 400;
    }

    # Restrict file extensions to the allow-list enforced by ems-floorplan
    # upload validator (Phase D).
    if ($arg_path !~* "\.(png|jpe?g|webp|svg)$") {
        return 400;
    }

    alias /var/www/uploads/floorplans/$arg_path;

    # Serve large images with HTTP range support (mobile / progressive).
    add_header Accept-Ranges bytes;
    add_header Cache-Control "public, max-age=86400, immutable" always;
    add_header X-Content-Type-Options nosniff always;

    # Long-lived edge cache — image filenames are uuid-named, so changes
    # always produce a new path.
    expires 1d;
    sendfile on;
    tcp_nopush on;

    # Auto-detect MIME from extension (Spring would have to set this manually).
    types {
        image/png  png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/svg+xml svg;
    }
}

# -----------------------------------------------------------------------------
# Strategy B — X-Accel-Redirect (opt-in per-request ACL).
# Spring authorises each request, then responds with status 200 and header
#     X-Accel-Redirect: /_protected_floorplans/2026-04/abcd-1234.png
# Nginx intercepts that header, looks up the file under the internal
# `/_protected_floorplans/` location, and streams it to the client. The
# original `/api/v1/floorplans/{id}/image` request goes to the backend.
#
# Trade-off: every image hit costs one Spring round-trip (auth check) but
# bytes are still streamed by Nginx. Use this when floorplan images are
# considered confidential.
# -----------------------------------------------------------------------------
location ^~ /_protected_floorplans/ {
    internal;
    alias /var/www/uploads/floorplans/;

    add_header Accept-Ranges bytes;
    add_header Cache-Control "private, max-age=600" always;
    add_header X-Content-Type-Options nosniff always;

    types {
        image/png  png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/svg+xml svg;
    }
}
