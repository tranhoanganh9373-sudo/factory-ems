# ============================================================
# ems-collector 默认配置（开发环境占位）
# 部署时由 ems-app 通过 spring.config.import 加载，并被外部 collector.yml 覆盖。
#
# 整套 schema 见：
#   ems-collector/src/main/java/com/ems/collector/config/CollectorProperties.java
# 启动校验逻辑：
#   - JSR-303 注解（@NotBlank/@Min...）由 Spring Boot 自动跑
#   - 跨字段校验（protocol vs host、count vs dataType.wordCount...）见
#     CollectorPropertiesValidator
#   - meterCode 存在性见 MeterCodeValidator
# ============================================================
