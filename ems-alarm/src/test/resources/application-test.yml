spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
ems:
  alarm:
    default-silent-timeout-seconds: 600
    default-consecutive-fail-count: 3
    poll-interval-seconds: 60
    suppression-window-seconds: 300
    webhook-retry-max: 3
    webhook-retry-backoff-seconds: [10, 60, 300]
    webhook-timeout-default-ms: 5000
    topology:
      enabled: false
      cron: "0 5 * * * *"
      ttl-cron: "0 15 3 * * *"
      history-retention-days: 7
      enter-threshold: -0.15
      exit-threshold: -0.10
