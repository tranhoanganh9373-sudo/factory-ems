# factory-ems Prometheus configuration
# Scrape factory-ems actuator + cAdvisor + node-exporter; rules in /etc/prometheus/rules/

global:
  scrape_interval: 15s
  evaluation_interval: 60s
  external_labels:
    cluster: factory-ems
    env: prod

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

scrape_configs:
  # 应用主指标（actuator/prometheus）
  - job_name: factory-ems
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['factory-ems:8080']
        labels:
          module: app

  # Prometheus 自身
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # 容器指标（docker stats / cgroup）
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # 主机指标（CPU / RAM / Disk / Network）
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
