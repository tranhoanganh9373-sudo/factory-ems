# Promtail — scrape docker container stdout → push to Loki
# Mount /var/run/docker.sock + /var/lib/docker/containers (read-only) in compose

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 容器名（去掉前导 /）
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # docker-compose service name（如果有）
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      # docker-compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      # 日志流（stdout / stderr）
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      # ems-app 输出 JSON 日志（logback-spring.xml 已配置）；尝试解析常见字段
      - match:
          selector: '{compose_service="factory-ems"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  msg: msg
                  traceId: traceId
            - labels:
                level:
                logger:
