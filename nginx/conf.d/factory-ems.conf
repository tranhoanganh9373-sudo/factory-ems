server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # 静态前端（SPA fallback）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 平面图（含图片）— 全部走后端，让 Spring 的 image controller 处理。
    # 历史 nginx 直出规则 (try_files /floorplans/$arg_file) 引用了不存在的查询参数，
    # 永远命中 =404，故移除。后端 FloorplanService.loadImage 已经从挂载点取文件。
    # Host 头透传，避免后端默认 Host 触发 trailing-slash 301 到 localhost:80（CORS 会拒）。
    location /api/v1/floorplans {
        proxy_pass http://factory-ems:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反代
    location /api/ {
        proxy_pass http://factory-ems:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id        $http_x_trace_id;
        proxy_read_timeout 60s;
    }

    # 健康检查（内网）
    location = /actuator/health/liveness {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://factory-ems:8080/actuator/health/liveness;
    }

    # Prometheus 指标（内网）
    location = /actuator/prometheus {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://factory-ems:8080/actuator/prometheus;
    }
}
