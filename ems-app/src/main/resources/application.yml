spring:
  application:
    name: factory-ems
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: Asia/Shanghai
      hibernate.format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # 上传体积上限。当前仅 /api/v1/secrets/opcua/cert 接收文件（.pfx blob），
      # PFX 文件实际不会超过几 KB；controller 内部另外 enforce 64KB 硬上限
      # （见 SecretController.uploadPfx）。这里的 YAML 上限是请求到达 controller
      # 之前的最早拦截点；max-request-size = max-file-size + 少量表单字段冗余。
      max-file-size: 256KB
      max-request-size: 512KB

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

ems:
  jwt:
    secret: ${EMS_JWT_SECRET:changeme-dev-only-32bytes-minimum!}
    access-token-minutes: 15
    refresh-token-days: 7
  login:
    max-failed-attempts: 5
    lockout-minutes: 15
  security:
    # IP resolution prefers the first segment of X-Forwarded-For. Operators
    # MUST ensure the upstream proxy (nginx, load balancer) strips client-supplied
    # XFF headers and rewrites them with the real source IP — otherwise attackers
    # can rotate XFF values to bypass per-IP throttles. /login is exempt because
    # ems.login.max-failed-attempts + lockout-minutes already throttles brute force.
    rate-limit:
      enabled: true
      read-per-minute: 600
      write-per-minute: 60
      burst-multiplier: 2
      exempt-path-prefixes:
        - /actuator
        - /error
        - /login
        - /api/v1/auth
  alarm:
    default-silent-timeout-seconds: 600
    default-consecutive-fail-count: 3
    poll-interval-seconds: 60
    suppression-window-seconds: 300
    webhook-retry-max: 3
    webhook-retry-backoff-seconds: [10, 60, 300]
    webhook-timeout-default-ms: 5000
    topology:
      enabled: false             # gray-launch: enable per-environment after deploy
      cron: "0 5 * * * *"        # every hour at minute 5
      ttl-cron: "0 15 3 * * *"   # every day at 03:15
      history-retention-days: 7
      enter-threshold: -0.15
      exit-threshold: -0.10
