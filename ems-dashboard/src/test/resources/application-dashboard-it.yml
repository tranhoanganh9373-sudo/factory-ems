spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
ems:
  influx:
    org: factory
    bucket: factory_ems
    measurement: energy_reading
  rollup:
    hourly.enabled: false
    retry.enabled: false
logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: WARN
