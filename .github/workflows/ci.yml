name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build & Test
        run: ./mvnw -B -T 4 clean verify
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: pnpm typecheck
      - name: Test
        run: pnpm test --run
      - name: Build
        run: pnpm build

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - name: Build backend image
        run: docker build -t factory-ems:ci -f ems-app/Dockerfile .
      - name: Build frontend
        run: cd frontend && pnpm install --frozen-lockfile && pnpm build
      - name: Start stack
        run: docker compose -f docker-compose.yml up -d --wait
      - name: Install Playwright
        run: cd e2e && pnpm install && pnpm exec playwright install --with-deps chromium
      - name: E2E
        run: cd e2e && pnpm test
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
