version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports: ["8888:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./data/ems_uploads:/var/www/uploads:ro
    depends_on:
      factory-ems:
        condition: service_healthy
    restart: unless-stopped

  factory-ems:
    image: factory-ems:${EMS_VERSION:-1.1.0-SNAPSHOT}
    build:
      context: .
      dockerfile: ems-app/Dockerfile
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EMS_DB_HOST: postgres
      EMS_INFLUX_URL: http://influxdb:8086
      EMS_INFLUX_TOKEN: ${EMS_INFLUX_TOKEN}
      EMS_INFLUX_ORG: ${EMS_INFLUX_ORG:-factory}
      EMS_INFLUX_BUCKET: ${EMS_INFLUX_BUCKET:-factory_ems}
      EMS_INFLUX_MEASUREMENT: ${EMS_INFLUX_MEASUREMENT:-energy_reading}
    volumes:
      - ./data/ems_uploads:/data/ems_uploads
      - ./logs/ems:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend-builder:
    image: factory-ems-frontend:${EMS_VERSION:-1.1.0-SNAPSHOT}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - frontend_dist:/share

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${EMS_DB_NAME:-factory_ems}
      POSTGRES_USER: ${EMS_DB_USER:-ems}
      POSTGRES_PASSWORD: ${EMS_DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-influx_admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${EMS_INFLUX_ORG:-factory}
      DOCKER_INFLUXDB_INIT_BUCKET: ${EMS_INFLUX_BUCKET:-factory_ems}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${EMS_INFLUX_TOKEN}
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    # ports:
    #   - "8086:8086"  # uncomment for direct access when debugging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  frontend_dist:
